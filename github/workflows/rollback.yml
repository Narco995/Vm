name: 🔄 Auto Rollback

on:
  workflow_run:
    workflows: ["🤖 Deploy AI Bot"]
    types: [completed]

jobs:
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "⚠️ Deployment failed — rolling back..."
            cd ~/Vm

            # Get previous image tag
            PREV=$(docker images ghcr.io/narco995/vm-telegram-bot --format "{{.Tag}}" | grep -v latest | sort -rn | sed -n '2p')
            if [ -n "$PREV" ]; then
              echo "Rolling back to version: $PREV"
              docker compose -f deploy/docker-compose.yml down
              docker tag ghcr.io/narco995/vm-telegram-bot:$PREV ghcr.io/narco995/vm-telegram-bot:latest
              docker compose -f deploy/docker-compose.yml up -d
              echo "✅ Rolled back to $PREV"
            else
              echo "⚠️ No previous version found, keeping current state"
            fi

      - name: Notify rollback
        run: echo "## ⚠️ Auto-rolled back due to deployment failure" >> $GITHUB_STEP_SUMMARY
