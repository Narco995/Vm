global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'telegram-bot-dashboard'
    static_configs:
      - targets: ['bot-dashboard:8080']
    metrics_path: '/health'

  - job_name: 'nginx'
    static_configs:
      - targets: ['bot-nginx:80']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
