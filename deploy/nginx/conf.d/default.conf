# HTTP → redirect to HTTPS (comment out if no SSL cert)
server {
    listen 80;
    server_name _;

    # Uncomment to force HTTPS:
    # return 301 https://$host$request_uri;

    # OR serve directly on HTTP (for local/testing):
    location / {
        proxy_pass http://bot-dashboard:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /health {
        proxy_pass http://bot-dashboard:8080/health;
    }

    location /api/ {
        proxy_pass http://bot-dashboard:8080/api/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache, no-store";
    }
}

