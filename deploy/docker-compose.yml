version: '3.8'\n\nservices:\n  telegram-bot:\n    image: ${DOCKER_HUB_USERNAME}/telegram-ai-bot:main\n    container_name: telegram-ai-bot\n    restart: unless-stopped\n    \n    environment:\n      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}\n      - OPENAI_API_KEY=${OPENAI_API_KEY}\n      - MISTRAL_API_KEY=${MISTRAL_API_KEY}\n      - DATABASE_PATH=/data/bot.db\n      - MAX_MEMORY_MESSAGES=50\n      - CODE_EXECUTION_TIMEOUT=30\n      - MAX_FILE_SIZE_MB=20\n      - DEFAULT_COMMUNICATION_STYLE=conversational\n      - LOG_LEVEL=INFO\n    \n    volumes:\n      - bot_data:/data\n      - bot_logs:/app/logs\n    \n    networks:\n      - bot_network\n    \n    deploy:\n      resources:\n        limits:\n          cpus: '2'\n          memory: 1G\n        reservations:\n          cpus: '1'\n          memory: 512M\n    \n    healthcheck:\n      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n      start_period: 40s\n    \n    logging:\n      driver: "json-file"\n      options:\n        max-size: "10m"\n        max-file: "3"\n\nvolumes:\n  bot_data:\n    driver: local\n  bot_logs:\n    driver: local\n\networks:\n  bot_network:\n    driver: bridge