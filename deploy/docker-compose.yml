version: '3.8'

services:
  telegram-bot:
    container_name: vm-telegram-bot
    image: python:3.11-slim
    working_dir: /app
    
    # ============ FIXED: EXPOSE PORTS ============
    ports:
      - "8000:8000"  # Health check port
    
    # ============ FIXED: ENVIRONMENT VARIABLES ============
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - AI_MODEL=${AI_MODEL:-gemini-2.5-flash}
      - AI_API_KEY=${AI_API_KEY}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-false}
      - TZ=${TZ:-UTC}
    
    # ============ FIXED: PROPER HEALTH CHECK ============
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health || exit 1"]
      interval: ${HEALTH_CHECK_INTERVAL:-30}s
      timeout: ${HEALTH_CHECK_TIMEOUT:-10}s
      retries: ${HEALTH_CHECK_RETRIES:-3}
      start_period: 30s
    
    # ============ VOLUMES & DATA PERSISTENCE ============
    volumes:
      - ./app:/app
      - bot-logs:/app/logs
      - bot-data:/app/data
    
    # ============ RESOURCE LIMITS ============
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT:-2.0}'
          memory: ${MEMORY_LIMIT:-4096}M
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # ============ LOGGING CONFIGURATION ============
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        labels: "service=telegram-bot,environment=${ENVIRONMENT:-production}"
    
    # ============ RESTART POLICY ============
    restart: unless-stopped
    
    # ============ SECURITY ============
    security_opt:
      - no-new-privileges:true
    
    # ============ COMMANDS & DEPENDENCIES ============
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python bot.py"
    
    depends_on:
      - health-check

  # ============ HEALTH CHECK SERVICE ============
  health-check:
    container_name: vm-health-monitor
    image: curlimages/curl:latest
    command: "tail -f /dev/null"
    restart: unless-stopped

volumes:
  bot-logs:
    driver: local
  bot-data:
    driver: local

networks:
  default:
    name: vm-network
    driver: bridge
