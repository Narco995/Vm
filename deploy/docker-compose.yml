version: '3.9'

# ============================================================
#  Advanced Telegram AI Bot — Full Production Stack
#  Includes: Bot + Web Dashboard + Nginx + Portainer + Watchtower
#  Access from: Browser, iOS Safari, Android, Desktop
# ============================================================

networks:
  bot-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  bot-data:
  bot-db:
  nginx-certs:
  portainer-data:
  prometheus-data:
  grafana-data:

services:

  # ─────────────────────────────────────────
  #  🤖 MAIN TELEGRAM BOT
  # ─────────────────────────────────────────
  telegram-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: telegram-bot
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - bot-data:/tmp/telegram_bot
      - bot-db:/app/data
    environment:
      - DATABASE_PATH=/app/data/bot_database.db
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.path.exists('/app/data')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ─────────────────────────────────────────
  #  🌐 WEB DASHBOARD (browser + iOS accessible)
  # ─────────────────────────────────────────
  web-dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: bot-dashboard
    restart: unless-stopped
    env_file: ../.env
    environment:
      - DATABASE_PATH=/app/data/bot_database.db
    volumes:
      - bot-db:/app/data
    ports:
      - "8080:8080"
    networks:
      - bot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  #  🔒 NGINX — HTTPS reverse proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-certs:/etc/nginx/certs
    networks:
      - bot-network
    depends_on:
      - web-dashboard

  # ─────────────────────────────────────────
  #  🔄 WATCHTOWER — Auto-update containers
  # ─────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: bot-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
    command: telegram-bot bot-dashboard
    networks:
      - bot-network

  # ─────────────────────────────────────────
  #  📊 PORTAINER — Docker management UI
  # ─────────────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: bot-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - bot-network

  # ─────────────────────────────────────────
  #  📈 PROMETHEUS — Metrics collection
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: bot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - bot-network

  # ─────────────────────────────────────────
  #  📉 GRAFANA — Visual metrics dashboard
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: bot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - bot-network
    depends_on:
      - prometheus
